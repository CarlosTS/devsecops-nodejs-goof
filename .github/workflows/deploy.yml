name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_ORG_ID: ${{ secrets.SNYK_ORG_ID }}

jobs:
  security-scans:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Setup Node
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: npm install

      # =========================
      # Install Snyk CLI
      # =========================
      - name: Install Snyk CLI
        run: npm install -g snyk

      # =========================
      # Verify secrets
      # =========================
      - name: Verify secrets
        run: |
          echo "Checking secrets..."

          if [ -z "$SNYK_TOKEN" ]; then
            echo "SNYK_TOKEN EMPTY ❌"
            exit 1
          fi

          if [ -z "$SNYK_ORG_ID" ]; then
            echo "SNYK_ORG_ID EMPTY ❌"
            exit 1
          fi

          echo "Secrets loaded correctly ✅"

      # =========================
      # Authenticate Snyk
      # =========================
      - name: Authenticate Snyk
        run: snyk auth $SNYK_TOKEN

      # =========================
      # SCA Scan
      # NO falla pipeline si encuentra issues
      # =========================
      - name: Run Snyk Dependency Scan
        continue-on-error: true
        run: |
          snyk test \
            --org=$SNYK_ORG_ID \
            --severity-threshold=high \
            --json-file-output=snyk-sca.json

      # =========================
      # SAST Scan
      # NO falla pipeline si encuentra issues
      # =========================
      - name: Run Snyk Code Scan
        continue-on-error: true
        run: |
          snyk code test \
            --org=$SNYK_ORG_ID \
            --severity-threshold=high \
            --sarif-file-output=snyk-code.sarif

      # =========================
      # Upload reports
      # =========================
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: snyk-security-reports
          path: |
            snyk-sca.json
            snyk-code.sarif

      # =========================
      # Monitor project in Snyk
      # =========================
      - name: Monitor project in Snyk
        continue-on-error: true
        run: |
          snyk monitor \
            --org=$SNYK_ORG_ID

      # =========================
      # Final status
      # =========================
      - name: Pipeline completed
        run: |
          echo "Security scans completed successfully ✅"
          echo "Pipeline will continue even if vulnerabilities were found."