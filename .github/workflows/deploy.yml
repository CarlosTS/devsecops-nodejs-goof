name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - main
      - dev
      - qas
  pull_request:

jobs:
  security-scans:
    name: Snyk Security Scans
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # NodeJS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: npm install

      # =========================
      # Install Snyk CLI
      # =========================
      - name: Install Snyk CLI
        run: npm install -g snyk

      # =========================
      # Authenticate Snyk
      # =========================
      - name: Authenticate Snyk
        run: snyk auth snyk_uat.1fcad39e.eyJlIjoxNzg2MDYwMjc0LCJoIjoic255ay5pbyIsImoiOiJBWjRLQU5WMS1tQU9qWXphWC00QzlRIiwicyI6Ik1UelVOdGNQU3phdWM0bHBkNWxLOVEiLCJ0aWQiOiJBQUFBQUFBQUFBQUFBQUFBQUFBQUFBIn0.nLNzW4KxKJY91ZeqBUCSB80GYToGPVNhyJg2IWUqQhAtMMgKF1trx9v139sik9rN_KI_FosG4ViAoQ7qX7gEAQ
        env:
          SNYK_TOKEN: snyk_uat.1fcad39e.eyJlIjoxNzg2MDYwMjc0LCJoIjoic255ay5pbyIsImoiOiJBWjRLQU5WMS1tQU9qWXphWC00QzlRIiwicyI6Ik1UelVOdGNQU3phdWM0bHBkNWxLOVEiLCJ0aWQiOiJBQUFBQUFBQUFBQUFBQUFBQUFBQUFBIn0.nLNzW4KxKJY91ZeqBUCSB80GYToGPVNhyJg2IWUqQhAtMMgKF1trx9v139sik9rN_KI_FosG4ViAoQ7qX7gEAQ

      # =========================
      # SCA - Dependency Scan
      # =========================
      - name: Run Snyk Dependency Scan
        run: |
          snyk test \
            --org=9d37b71d-44f3-4a2a-b19a-44a43372641f \
            --severity-threshold=high \
            --json-file-output=snyk-sca.json
        env:
          SNYK_TOKEN: snyk_uat.1fcad39e.eyJlIjoxNzg2MDYwMjc0LCJoIjoic255ay5pbyIsImoiOiJBWjRLQU5WMS1tQU9qWXphWC00QzlRIiwicyI6Ik1UelVOdGNQU3phdWM0bHBkNWxLOVEiLCJ0aWQiOiJBQUFBQUFBQUFBQUFBQUFBQUFBQUFBIn0.nLNzW4KxKJY91ZeqBUCSB80GYToGPVNhyJg2IWUqQhAtMMgKF1trx9v139sik9rN_KI_FosG4ViAoQ7qX7gEAQ
          SNYK_ORG_ID: 9d37b71d-44f3-4a2a-b19a-44a43372641f
